services:
  postgres:
    image: postgres:16
    container_name: manifold-db
    environment:
      POSTGRES_DB: ${PG_DB:-manifold}
      POSTGRES_USER: ${PG_USER:-manifold}
      POSTGRES_PASSWORD: ${PG_PASS:?Set PG_PASS in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  manifold:
    build: .
    container_name: manifold
    env_file: .env
    environment:
      - PG_HOST=manifold-db
      - PG_PORT=5432
      - PG_DB=${PG_DB:-manifold}
      - PG_USER=${PG_USER:-manifold}
      - PG_PASS=${PG_PASS}
      - BRIDGE_HOST=${BRIDGE_HOST:?Set BRIDGE_HOST in .env}
      - BRIDGE_PORT=${BRIDGE_PORT:-8080}
      - MANIFOLD_HOST=${MANIFOLD_HOST:?Set MANIFOLD_HOST in .env}
      - MANIFOLD_PORT=${MANIFOLD_PORT:-40000}
      - PYTHONUNBUFFERED=1
    ports:
      - "40000:40000"
    networks:
      - internal
    volumes:
      - output:/app/output
      - logos:/app/logos
      - streams:/app/streams
      - bumps:/app/bumps
      - ${LOG_PATH:-./logs}:/app/logs
      - ${DATA_PATH:-./data}:/app/data
      - ${MEDIA_PATH:-/mnt}:/browse:ro
    depends_on:
      - postgres
    restart: unless-stopped

networks:
  internal:

volumes:
  output:
  logos:
  streams:
  bumps:
  pgdata:
