services:
  manifold:
    build: .
    container_name: manifold
    env_file: .env
    environment:
      - PG_HOST=${PG_HOST:?Set PG_HOST in .env}
      - PG_PORT=${PG_PORT:-5432}
      - PG_DB=${PG_DB:-manifold}
      - PG_USER=${PG_USER:-manifold}
      - PG_PASS=${PG_PASS:?Set PG_PASS in .env}
      - BRIDGE_HOST=${BRIDGE_HOST:?Set BRIDGE_HOST in .env}
      - BRIDGE_PORT=${BRIDGE_PORT:-8080}
      - MANIFOLD_HOST=${MANIFOLD_HOST:?Set MANIFOLD_HOST in .env}
      - MANIFOLD_PORT=${MANIFOLD_PORT:-40000}
      - PYTHONUNBUFFERED=1
    ports:
      - "40000:40000"
    volumes:
      - output:/app/output
      - logos:/app/logos
      - streams:/app/streams
      - bumps:/app/bumps
      - ${LOG_PATH:-./logs}:/app/logs
      - ${DATA_PATH:-./data}:/app/data
      - ${MEDIA_PATH:-/mnt}:/browse:ro
    restart: unless-stopped

volumes:
  output:
  logos:
  streams:
  bumps:
