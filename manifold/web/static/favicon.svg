<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="#1E293B"/>

  <!-- Three inputs converging -->
  <path d="M 4 8 C 10 8, 12 16, 18 16" fill="none" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="4" y1="16" x2="18" y2="16" stroke="#14B8A6" stroke-width="2" stroke-linecap="round"/>
  <path d="M 4 24 C 10 24, 12 16, 18 16" fill="none" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Input dots -->
  <circle cx="3" cy="8" r="2" fill="#14B8A6" opacity="0.6"/>
  <circle cx="3" cy="16" r="2" fill="#14B8A6"/>
  <circle cx="3" cy="24" r="2" fill="#14B8A6" opacity="0.6"/>

  <!-- Center node -->
  <circle cx="20" cy="16" r="4" fill="#14B8A6"/>

  <!-- Single output -->
  <line x1="24" y1="16" x2="30" y2="16" stroke="url(#mGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 27 12 L 31 16 L 27 20" fill="none" stroke="#0D9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
