<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#0F766E"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect x="0" y="0" width="80" height="80" rx="16" fill="#E2E8F0"/>

  <!-- Three input streams converging from left -->
  <path d="M 10 18 C 22 18, 28 38, 42 40" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="40" x2="42" y2="40" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 10 62 C 22 62, 28 42, 42 40" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Input dots -->
  <circle cx="8" cy="18" r="3" fill="#0D9488" opacity="0.6"/>
  <circle cx="8" cy="40" r="3" fill="#0D9488"/>
  <circle cx="8" cy="62" r="3" fill="#0D9488" opacity="0.6"/>

  <!-- Center convergence node -->
  <circle cx="46" cy="40" r="6" fill="#0D9488"/>
  <circle cx="46" cy="40" r="10" fill="none" stroke="#0D9488" stroke-width="1" opacity="0.25"/>

  <!-- Single output stream -->
  <line x1="52" y1="40" x2="72" y2="40" stroke="url(#mGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 66 34 L 74 40 L 66 46" fill="none" stroke="#0F766E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark - full teal -->
  <text x="96" y="52" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="42" font-weight="900" fill="#0D9488" letter-spacing="-1.5">MANIFOLD</text>
</svg>
